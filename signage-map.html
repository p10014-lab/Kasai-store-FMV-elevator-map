<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイネージ配信マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; background: #f0f2f5; }

    #header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 1000; position: relative;
    }
    #header h1 { font-size: 17px; font-weight: 700; letter-spacing: 1px; }
    #header .subtitle { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    #stats { display: flex; gap: 10px; font-size: 12px; flex-wrap: wrap; }
    .stat-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 10px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; }

    #controls {
      background: white; padding: 8px 16px;
      display: flex; gap: 8px; align-items: center;
      border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
    }
    .toggle-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 13px; border-radius: 20px; border: 2px solid;
      cursor: pointer; font-size: 12px; font-weight: 600;
      transition: all 0.2s; background: white;
    }
    .toggle-btn.fm  { border-color: #7FD44A; color: #5aab2a; }
    .toggle-btn.fm.active  { background: #7FD44A; color: white; }
    .toggle-btn.el  { border-color: #4A8FD4; color: #2a6aab; }
    .toggle-btn.el.active  { background: #4A8FD4; color: white; }
    .toggle-btn.su  { border-color: #E53935; color: #b71c1c; }
    .toggle-btn.su.active  { background: #E53935; color: white; }
    .toggle-btn.mx  { border-color: #FF6D00; color: #bf360c; }
    .toggle-btn.mx.active  { background: #FF6D00; color: white; }
    .toggle-btn:hover { transform: scale(1.03); }

    #map { width: 100%; height: calc(100vh - 115px); }

    #progress-overlay {
      position: fixed; inset: 0;
      background: rgba(15,20,40,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: white;
    }
    #progress-overlay h2 { font-size: 19px; margin-bottom: 8px; }
    #progress-note { font-size: 12px; opacity: 0.6; margin-bottom: 20px; }
    #progress-bar-wrap {
      width: 380px; background: rgba(255,255,255,0.15);
      border-radius: 10px; overflow: hidden; height: 13px;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7FD44A, #4A8FD4, #E53935, #FF6D00);
      border-radius: 10px; width: 0%; transition: width 0.3s;
    }
    #progress-text { margin-top: 11px; font-size: 13px; font-weight: 600; }
    #progress-detail { margin-top: 5px; font-size: 11px; opacity: 0.55; max-width: 400px; text-align: center; }
    #progress-counts { margin-top: 13px; display: flex; gap: 18px; font-size: 12px; flex-wrap: wrap; justify-content: center; }

    #error-panel {
      position: fixed; bottom: 14px; right: 14px;
      background: white; border-radius: 10px; padding: 12px 14px;
      max-width: 320px; max-height: 200px; overflow-y: auto;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      font-size: 12px; display: none; z-index: 2000;
      border-left: 4px solid #e53935;
    }
    #error-panel h4 { color: #c62828; margin-bottom: 7px; font-size: 13px; }
    .err-item { padding: 3px 0; border-bottom: 1px solid #f5f5f5; color: #555; }

    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
    .popup-inner { padding: 2px 4px; }
    .popup-type { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; opacity: 0.6; }
    .popup-addr { font-size: 13px; margin-top: 3px; line-height: 1.6; }
    .popup-fm .popup-type { color: #5aab2a; }
    .popup-el .popup-type { color: #2a6aab; }
    .popup-su .popup-type { color: #b71c1c; }
    .popup-mx .popup-type { color: #bf360c; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>📍 サイネージ配信マップ</h1>
    <div class="subtitle">ファミリーマートビジョン・エレベーターサイネージ・スシロー・マルエツ</div>
  </div>
  <div id="stats">
    <div class="stat-chip"><span class="dot" style="background:#7FD44A"></span><span id="cnt-fm">FM: 読込中</span></div>
    <div class="stat-chip"><span class="dot" style="background:#4A8FD4"></span><span id="cnt-el">EL: 読込中</span></div>
    <div class="stat-chip"><span class="dot" style="background:#E53935"></span><span id="cnt-su">スシロー: -</span></div>
    <div class="stat-chip"><span class="dot" style="background:#FF6D00"></span><span id="cnt-mx">マルエツ: -</span></div>
  </div>
</div>

<div id="controls">
  <button class="toggle-btn fm active" id="btn-fm" onclick="toggleLayer('fm')">🟢 ファミリーマートビジョン</button>

  <button class="toggle-btn mx active" id="btn-mx" onclick="toggleLayer('mx')">🟠 マルエツ</button>

</div>

<div id="map"></div>

<div id="progress-overlay">
  <h2>📍 住所を地図に配置中...</h2>
  <div id="progress-note">国土地理院 APIでジオコーディングしています</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-text">0 / 155 件</div>
  <div id="progress-detail">準備中...</div>
  <div id="progress-counts">
    <span style="color:#7FD44A" id="pc-fm">🟢 FM: 0件</span>
    <span style="color:#4A8FD4" id="pc-el">🔵 EL: 0件</span>
    <span style="color:#E53935" id="pc-su">🔴 スシロー: 0件</span>
    <span style="color:#FF6D00" id="pc-mx">🟠 マルエツ: 0件</span>
  </div>
</div>

<div id="error-panel">
  <h4 id="error-title">⚠ 座標未取得の住所</h4>
  <div id="error-items"></div>
</div>

// ============================================================
//  ADDRESS NORMALIZATION
// ============================================================
function toHalf(s) {
  return s.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/　/g,' ');
}
function addPref(addr) {
  if (/^(江戸川区|江東区|墨田区|葛飾区|荒川区)/.test(addr)) return '東京都' + addr;
  if (/^(浦安市|市川市|船橋市|松戸市)/.test(addr)) return '千葉県' + addr;
  return addr;
}
function cleanAddr(addr) {
  return addr
    .replace(/\s*(第.+ビル|[ァ-ヶー]{2,}(ビル|マンション|アパート|レジデンス|ハイツ|タワー|センター|アルカイースト|グランデュール|フェザン|ウイング|サイトウ)).*/g, '')
    .replace(/他$/, '').trim();
}
function formatForGSI(raw, isFM) {
  let a = toHalf(raw);
  if (isFM) a = addPref(a);
  return cleanAddr(a);
}

// ============================================================
//  MAP — CartoDB Light (淡い地図)
// ============================================================
const map = L.map('map', { center:[35.680,139.830], zoom:12 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

// ============================================================
//  ICONS
// ============================================================
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:26px;height:26px;background:${color};border:3px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 7px rgba(0,0,0,0.4);"></div>`,
    iconSize:[26,26], iconAnchor:[13,26], popupAnchor:[0,-28]
  });
}
const FM_ICON = makeIcon('#7FD44A');
const EL_ICON = makeIcon('#4A8FD4');
const SU_ICON = makeIcon('#E53935');
const MX_ICON = makeIcon('#FF6D00');

// ============================================================
//  LAYERS & TOGGLE
// ============================================================
const fmLayer = L.layerGroup().addTo(map);
const elLayer = L.layerGroup().addTo(map);
const suLayer = L.layerGroup().addTo(map);
const mxLayer = L.layerGroup().addTo(map);
let fmOn=true, elOn=true, suOn=true, mxOn=true;

function toggleLayer(t) {
  if (t==='fm') { fmOn=!fmOn; fmOn?fmLayer.addTo(map):map.removeLayer(fmLayer); document.getElementById('btn-fm').classList.toggle('active',fmOn); }
  if (t==='el') { elOn=!elOn; elOn?elLayer.addTo(map):map.removeLayer(elLayer); document.getElementById('btn-el').classList.toggle('active',elOn); }
  if (t==='su') { suOn=!suOn; suOn?suLayer.addTo(map):map.removeLayer(suLayer); document.getElementById('btn-su').classList.toggle('active',suOn); }
  if (t==='mx') { mxOn=!mxOn; mxOn?mxLayer.addTo(map):map.removeLayer(mxLayer); document.getElementById('btn-mx').classList.toggle('active',mxOn); }
}

// ============================================================
//  GEOCODING
// ============================================================
async function geocodeGSI(query) {
  try {
    const r = await fetch(`https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(query)}`);
    const d = await r.json();
    if (d && d.length > 0) { const [lon,lat]=d[0].geometry.coordinates; return {lat,lon}; }
  } catch(e){}
  try {
    const r2 = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&countrycodes=jp&accept-language=ja`,{headers:{'User-Agent':'SignageMapper/1.0'}});
    const d2 = await r2.json();
    if (d2 && d2.length>0) return {lat:parseFloat(d2[0].lat),lon:parseFloat(d2[0].lon)};
  } catch(e){}
  return null;
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));

// ============================================================
//  MAIN
// ============================================================
let fmOk=0, elOk=0, suOk=0, mxOk=0;
const errors=[], allBounds=[];
const total = FM_RAW.length + EL_RAW.length + SUSHIRO_RAW.length + MARUETSU_RAW.length;
let done=0;

function setProgress(label) {
  done++;
  const pct = Math.round(done/total*100);
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `${done} / ${total} 件処理済み (${pct}%)`;
  document.getElementById('progress-detail').textContent = label;
  document.getElementById('pc-fm').textContent = `🟢 FM: ${fmOk}件`;
  document.getElementById('pc-el').textContent = `🔵 EL: ${elOk}件`;
  document.getElementById('pc-su').textContent = `🔴 スシロー: ${suOk}件`;
  document.getElementById('pc-mx').textContent = `🟠 マルエツ: ${mxOk}件`;
}

function addMarker(layer, result, icon, popupClass, typeLabel, nameLabel, addrLabel) {
  const m = L.marker([result.lat,result.lon],{icon});
  m.bindPopup(`<div class="popup-inner ${popupClass}">
    <div class="popup-type">${typeLabel}</div>
    <div class="popup-addr">${nameLabel ? '<strong>'+nameLabel+'</strong><br>' : ''}${addrLabel}</div>
  </div>`);
  layer.addLayer(m);
  allBounds.push([result.lat,result.lon]);
}

async function runGeocoding() {
  for (const raw of FM_RAW) {
    const res = await geocodeGSI(formatForGSI(raw,true));
    setProgress('FM: '+raw);
    if (res) { addMarker(fmLayer,res,FM_ICON,'popup-fm','ファミリーマートビジョン','',raw); fmOk++; }
    else errors.push({type:'FM',raw});
    await sleep(60);
  }
  for (const raw of EL_RAW) {
    const res = await geocodeGSI(formatForGSI(raw,false));
    setProgress('EL: '+raw);
    if (res) { addMarker(elLayer,res,EL_ICON,'popup-el','エレベーターサイネージ','',raw); elOk++; }
    else errors.push({type:'EL',raw});
    await sleep(60);
  }
  for (const s of SUSHIRO_RAW) {
    const res = await geocodeGSI(formatForGSI(s.addr,false));
    setProgress('スシロー: '+s.name);
    if (res) { addMarker(suLayer,res,SU_ICON,'popup-su','スシロー',s.name,s.addr); suOk++; }
    else errors.push({type:'スシロー',raw:s.name});
    await sleep(60);
  }
  for (const s of MARUETSU_RAW) {
    const res = await geocodeGSI(formatForGSI(s.addr,false));
    setProgress('マルエツ: '+s.name);
    if (res) { addMarker(mxLayer,res,MX_ICON,'popup-mx','マルエツ',s.name,s.addr); mxOk++; }
    else errors.push({type:'マルエツ',raw:s.name});
    await sleep(60);
  }

  if (allBounds.length>0) map.fitBounds(allBounds,{padding:[50,50]});
  document.getElementById('progress-overlay').style.display='none';
  document.getElementById('cnt-fm').textContent = `FM: ${fmOk}/${FM_RAW.length}件`;
  document.getElementById('cnt-el').textContent = `EL: ${elOk}/${EL_RAW.length}件`;
  document.getElementById('cnt-su').textContent = `スシロー: ${suOk}/${SUSHIRO_RAW.length}件`;
  document.getElementById('cnt-mx').textContent = `マルエツ: ${mxOk}/${MARUETSU_RAW.length}件`;

  if (errors.length>0) {
    document.getElementById('error-title').textContent = `⚠ 座標未取得の住所 (${errors.length}件)`;
    const items = document.getElementById('error-items');
    errors.forEach(e => {
      const d=document.createElement('div'); d.className='err-item';
      d.textContent=`[${e.type}] ${e.raw}`; items.appendChild(d);
    });
    document.getElementById('error-panel').style.display='block';
  }
}

runGeocoding();
</script>

</html>
